    <!-- Gracefully handle and suppress MetaMask/wallet extension errors inside the sandbox iframe -->
    <script>
      (function() {
        const originalConsoleError = console.error;
        console.error = function(...args) {
          const errMsg = args.map(arg => String(arg)).join(" ");
          if (errMsg.includes("MetaMask") || errMsg.includes("ethereum") || errMsg.includes("wallet") || errMsg.includes("provider")) {
            return;
          }
          originalConsoleError.apply(console, args);
        };

        window.addEventListener("unhandledrejection", function(event) {
          const reason = event.reason;
          if (reason) {
            const reasonStr = String(reason.message || reason);
            if (reasonStr.includes("MetaMask") || reasonStr.includes("ethereum") || reasonStr.includes("wallet") || reasonStr.includes("provider")) {
              event.preventDefault();
            }
          }
        });

        window.addEventListener("error", function(event) {
          const errMsg = String(event.message || event.error);
          if (errMsg.includes("MetaMask") || errMsg.includes("ethereum") || errMsg.includes("wallet") || errMsg.includes("provider")) {
            event.preventDefault();
          }
        });
      })();
    </script>
